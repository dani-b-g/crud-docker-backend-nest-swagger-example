version: '3.9'
services:
  api:
    build: .
    container_name: products_api
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - mongo
      - minio

  mongo:
    image: mongo:7
    container_name: products_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: products_minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: products_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/products-images || true &&
      mc anonymous set public local/products-images;
      "

volumes:
  mongo_data:
  minio_data:
